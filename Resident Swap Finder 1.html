<title>UCI PM&R Call Swap Hub 2026-2027</title>
<style>
  :root {
    --bg:#f8f7f5;--surface:#fff;--surface2:#f2f1ef;--border:#e0ddd8;

    --accent:#2563eb;--accent-bg:#eff6ff;--accent-bd:#bfdbfe;
    --green:#16a34a;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
    --red:#dc2626;--red-bg:#fef2f2;--red-bd:#fecaca;
    --amber:#d97706;--amber-bg:#fffbeb;--amber-bd:#fde68a;
    --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-bd:#ddd6fe;

  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
  select,button{font-family:inherit;font-size:13px}
  select{padding:6px 10px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);width:100%;cursor:pointer}
  select:focus{outline:none;border-color:var(--accent)}
  .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:var(--sh);gap:10px;flex-wrap:wrap}
  .hdr-l{display:flex;align-items:center;gap:12px}
  .hdr-title{font-size:15px;font-weight:600}
  .hdr-sub{font-size:11px;color:var(--text3);margin-top:1px}
  .nav{display:flex;gap:4px;flex-wrap:wrap}
  .nb{padding:6px 13px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-weight:500;font-size:12px;transition:all .15s}
  .nb:hover{background:var(--surface2)}
  .nb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .cnt{display:inline-block;margin-left:5px;font-size:10px;padding:1px 5px;border-radius:10px;background:var(--amber);color:#fff}
  .main{max-width:840px;margin:0 auto;padding:18px 16px 60px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--sh)}
  .btn{padding:7px 14px;border-radius:var(--rs);border:1px solid var(--border);cursor:pointer;font-weight:500;font-size:12px;transition:all .15s}
  .btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-p:hover{background:#1d4ed8}
  .btn-p:disabled{opacity:.4;cursor:not-allowed}
  .btn-s{background:var(--surface);color:var(--text2)}
  .btn-s:hover{background:var(--surface2)}
  .btn-s:disabled{opacity:.5;cursor:not-allowed}
  .btn-d{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
  .btn-d:hover{background:#fee2e2}
  .btn-ds{background:var(--red);color:#fff;border-color:var(--red)}
  .btn-ds:hover{background:#b91c1c}
  .btn-ds:disabled{opacity:.5;cursor:not-allowed}
  .btn-pdf{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
  .btn-pdf:hover{background:#dcfce7}
  .btn-pdf:disabled{opacity:.5;cursor:not-allowed}
  .bsm{padding:3px 10px;font-size:11px}
  .badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
  .bg{background:var(--green-bg);color:var(--green)}
  .br{background:var(--red-bg);color:var(--red)}
  .ba{background:var(--amber-bg);color:var(--amber)}
  .bhol{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd);font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500;white-space:nowrap}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{padding:8px 10px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border)}
  td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr.sw{background:var(--amber-bg)}
  tr.hr{background:var(--purple-bg)}
  tr.sw.hr{background:linear-gradient(135deg,var(--amber-bg) 50%,var(--purple-bg) 100%)}
  tr:not(.sw):not(.hr):hover{background:var(--surface2)}
  .xd{color:var(--text3);text-decoration:line-through}
  .curn{font-weight:600}
  .swn{font-size:11px;color:var(--text3);margin-top:1px}
  .holn{font-size:10px;color:var(--purple);margin-top:2px;font-weight:500}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  .modal{background:var(--surface);border-radius:var(--r);padding:20px;max-width:480px;width:100%;box-shadow:var(--shl);max-height:90vh;overflow-y:auto}

  .ms{font-size:12px;color:var(--text2);margin-top:2px}

  .fl{font-size:12px;color:var(--text2);font-weight:500;display:block;margin-bottom:5px;margin-top:14px}

  .vok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
  .vw{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

  .swbox{background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--rs);padding:12px;font-size:13px;line-height:1.6;margin-bottom:14px}

  .cft{font-weight:600;color:var(--red);margin-bottom:6px;font-size:13px}
  .cfa{display:flex;gap:8px;margin-top:10px}
  .tsn{font-size:11px;color:var(--text3);margin-top:6px}

  .rbox{padding:14px;border-radius:var(--r);font-size:13px}
  .rok{background:var(--green-bg);border:1px solid var(--green-bd)}

  .ri{padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px}
  .rir{display:flex;align-items:center;gap:7px}
  .ris{font-size:11px;color:var(--text3);margin-top:3px}
  .sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin:10px 0 6px}
  .rotb{border:1px solid var(--border);border-radius:var(--rs);padding:12px;margin-bottom:8px}
  .rotv{border-left:3px solid var(--green)}

  .roth{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;margin-bottom:8px}
  .rotr{font-size:13px;margin:4px 0;display:flex;gap:6px;align-items:baseline;flex-wrap:wrap}
  .rotrs{font-size:11px;color:var(--text3)}
  .roti{font-size:12px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);color:var(--red)}
  .fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px}
  .cbi{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 8px;border-radius:var(--rs);cursor:pointer;user-select:none;border:1px solid var(--border);background:var(--surface);transition:all .1s}

  .rrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
  .vt{font-size:15px;font-weight:600}
  .vs{font-size:11px;color:var(--text3);margin-top:1px}
  .smbadge{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500}
  .clbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px;margin-top:12px;display:block}
  .hol-leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--purple);padding:5px 10px;background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:var(--rs);margin-bottom:10px}
  .pdf-err{font-size:12px;color:var(--red);padding:6px 10px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--rs);margin-top:8px;display:none}

function holChips(ct,i){return getH(ct,i).map(h=>`<span class="bhol">&#128197; ${h.nm} <span style="opacity:.65;font-weight:400">${h.s}</span></span>`).join(' ');}

/* ═══ STORAGE ════════════════════════════════════════════════ */
let HAS_SHARED=false;
async function initStorage(){
  if(typeof window.storage==='undefined'){HAS_SHARED=false;return;}
  try{await window.storage.set('pmr_ping','1',true);HAS_SHARED=true;}catch{HAS_SHARED=false;}
}
function updateBadge(){
  const el=document.getElementById('smbadge');if(!el)return;
  el.innerHTML=HAS_SHARED
    ?'<span class="smbadge" style="background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)">&#128994; Live &mdash; syncs with all residents</span>'
    :'<span class="smbadge" style="background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)">&#128993; Preview &mdash; local only</span>';
}
async function storeGet(key){
  if(HAS_SHARED){try{const d=await window.storage.get(key,true);return d?JSON.parse(d.value):[];}catch{return[];}}
  try{return JSON.parse(localStorage.getItem(key)||'[]');}catch{return[];}
}

  if(HAS_SHARED){await window.storage.set(key,JSON.stringify(data),true);return;}
  localStorage.setItem(key,JSON.stringify(data));
}

const pd=s=>{const[m,d]=s.trim().split('/').map(Number);return new Date(m>=6?2026:2027,m-1,d);};
const fmtTs=ts=>new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
const fmtDate=ts=>new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
function allRes(ct){return[...new Set(BASE[ct].map(w=>w.r))].sort();}
function buildEff(ct,swList){
  const s=BASE[ct].map(w=>({...w,cur:w.r,switched:false,swId:null,short:null,full:null,ts:null}));
  (swList||[]).forEach(({id,wA,wB,rA,rB,ts})=>{
    const dA=BASE[ct][wA].d,dB=BASE[ct][wB].d;
    s[wA]={...s[wA],cur:rB,switched:true,swId:id,short:`${rA} now covers ${dB}`,full:`${rB} covers ${dA} <-> ${rA} covers ${dB}`,ts};
    s[wB]={...s[wB],cur:rA,switched:true,swId:id,short:`${rB} now covers ${dA}`,full:`${rB} covers ${dA} <-> ${rA} covers ${dB}`,ts};
  });
  return s;
}
function rebuildEff(){eff={lbm:buildEff('lbm',sws.lbm),uci_primary:buildEff('uci_primary',sws.uci_primary),uci_consult:buildEff('uci_consult',sws.uci_consult)};}
function resCalls(name){return Object.entries(eff).flatMap(([ct,s])=>s.map((w,i)=>w.cur===name?{ct,i,dates:w.d}:null).filter(Boolean));}
function isAdj(c,tCt,tIdx){if(c.ct===tCt&&c.i===tIdx)return false;return Math.abs((pd(eff[tCt][tIdx].d.split('-')[0])-pd(eff[c.ct][c.i].d.split('-')[0]))/86400000)<=13;}
function relLbl(c,tCt,tIdx){return(pd(eff[c.ct][c.i].d.split('-')[0])-pd(eff[tCt][tIdx].d.split('-')[0]))<0?'week before':'week after';}
function swapPairValid(holder,idx,cand,cIdx,ct){
  if(resCalls(holder).filter(c=>!(c.ct===ct&&c.i===idx)).some(c=>isAdj(c,ct,cIdx)))return false;
  if(resCalls(cand).filter(c=>!(c.ct===ct&&c.i===cIdx)).some(c=>isAdj(c,ct,idx)))return false;
  return true;
}
function validExchWeeks(holder,idx,cand,ct){
  return eff[ct].map((w,i)=>({...w,i})).filter(w=>w.cur===cand&&w.i!==idx&&swapPairValid(holder,idx,cand,w.i,ct));
}

  document.getElementById('modal').innerHTML=`

/* ═══ SWAP FINDER ══════════════════════════════════════════════ */
function renderFinder(){
  const f=F,sched=f.ct?eff[f.ct]:[];
  let r2='';
  if(f.ct&&f.wIdx!==''){
    const idx=parseInt(f.wIdx),holder=eff[f.ct][idx].cur,swHols=getH(f.ct,idx);
    const elig=[],inelig=[];
    Object.entries(f.filter).forEach(([name,on])=>{
      if(!on)return;
      const valid=validExchWeeks(holder,idx,name,f.ct);
      if(valid.length){elig.push({name,weeks:valid});}
      else{
        const cw=eff[f.ct].map((w,i)=>({...w,i})).filter(w=>w.cur===name&&w.i!==idx);
        const iss=new Set();
        if(!cw.length){
          resCalls(name).filter(c=>isAdj(c,f.ct,idx)).forEach(c=>iss.add(`${name} has ${LABELS[c.ct]} the ${relLbl(c,f.ct,idx)} (${c.dates})`));
          if(!iss.size)iss.add(`${name} has no weeks on this schedule to offer`);
        }else{
          cw.forEach(w=>{
            resCalls(holder).filter(c=>!(c.ct===f.ct&&c.i===idx)&&isAdj(c,f.ct,w.i)).forEach(c=>iss.add(`${holder} has ${LABELS[c.ct]} the ${relLbl(c,f.ct,w.i)} (${c.dates}) - blocks taking ${w.d}`));
            resCalls(name).filter(c=>!(c.ct===f.ct&&c.i===w.i)&&isAdj(c,f.ct,idx)).forEach(c=>iss.add(`${name} has ${LABELS[c.ct]} the ${relLbl(c,f.ct,idx)} (${c.dates})`));
          });
          if(!iss.size)iss.add('No conflict-free exchange weeks available');
        }
        inelig.push({name,reasons:[...iss]});
      }
    });
    const swHolBanner=swHols.length?`<div style="margin-bottom:8px">${swHols.map(h=>`<span class="bhol">&#128197; ${h.nm} <span style="opacity:.65;font-weight:400">${h.s}</span></span>`).join(' ')} <span style="font-size:11px;color:var(--purple)"> &mdash; you are giving this up</span></div>`:'';
    const hd=`<div class="rh">${eff[f.ct][idx].d} &mdash; currently: ${holder}</div>${swHolBanner}`;
    const eH=elig.length?`<div class="sl">&#10003; Eligible</div>${elig.map(({name,weeks})=>`<div class="ri"><div class="rir"><span class="badge bg">eligible</span><strong>${name}</strong></div><div class="ris">${weeks.map(w=>`<span style="white-space:nowrap">${w.d}${holSummary(f.ct,w.i)}</span>`).join('&ensp;&middot;&ensp;')}</div></div>`).join('')}`:'';
    const iH=inelig.length?`<div class="sl">&#10007; Ineligible</div>${inelig.map(({name,reasons})=>`<div class="ri"><div class="rir"><span class="badge br">blocked</span><strong>${name}</strong></div><div class="ris">${reasons.join('<br>')}</div></div>`).join('')}`:'';
    const ns=Object.values(f.filter).every(v=>!v)?'<div>No residents selected.</div>':'';
    r2=`<div class="rbox ${elig.length?'rok':'rwarn'}">${hd}${eH}${iH}${ns}</div>`;
  }
  let r3='';
  if(f.mode==='3way'&&f.ct&&f.w1!==''&&f.w2!==''&&f.w3!==''){
    const[i1,i2,i3]=[parseInt(f.w1),parseInt(f.w2),parseInt(f.w3)];
    if(i1===i2||i1===i3||i2===i3){r3=`<div class="rbox rwarn">Select 3 different weeks.</div>`;}
    else{
      const[o1,o2,o3]=[eff[f.ct][i1].cur,eff[f.ct][i2].cur,eff[f.ct][i3].cur];
      if(o1===o2||o1===o3||o2===o3){r3=`<div class="rbox rwarn">All 3 weeks must belong to different residents.</div>`;}
      else{
        function chkR(asns){let v=true;const iss=[];asns.forEach(({rec,gI,gvI})=>{resCalls(rec).filter(c=>!(c.ct===f.ct&&c.i===gvI)&&isAdj(c,f.ct,gI)).forEach(c=>{v=false;iss.push(`${rec} can't take ${eff[f.ct][gI].d}: ${LABELS[c.ct]} the ${relLbl(c,f.ct,gI)} (${c.dates})`);});});return{v,iss,asns};}
        const rA=chkR([{rec:o1,gI:i2,gvI:i1},{rec:o2,gI:i3,gvI:i2},{rec:o3,gI:i1,gvI:i3}]);
        const rB=chkR([{rec:o1,gI:i3,gvI:i1},{rec:o3,gI:i2,gvI:i3},{rec:o2,gI:i1,gvI:i2}]);
        r3=[rA,rB].map((rot,ri)=>`<div class="rotb ${rot.v?'rotv':'rotn'}"><div class="roth"><span class="badge ${rot.v?'bg':'br'}">${rot.v?'&#10003; valid':'&#10007; blocked'}</span>Rotation option ${ri+1}</div>${rot.asns.map(({rec,gI,gvI})=>`<div class="rotr">&rarr; <strong>${rec}</strong><span class="rotrs" style="margin-left:6px">gives ${eff[f.ct][gvI].d} &middot; receives ${eff[f.ct][gI].d}${holText(f.ct,gI)}</span></div>`).join('')}${!rot.v?`<div class="roti">${rot.iss.map(i=>`<div>&bull; ${i}</div>`).join('')}</div>`:''}</div>`).join('');
      }
    }
  }
  const fH=f.ct&&f.wIdx!==''&&Object.keys(f.filter).length?`<div class="card" style="background:var(--surface2)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:13px;font-weight:600">Filter residents</span><div style="display:flex;gap:5px"><button class="btn btn-s bsm" onclick="setAllF(true)">All</button><button class="btn btn-s bsm" onclick="setAllF(false)">None</button></div></div><div class="fg">${Object.entries(f.filter).map(([n,on])=>`<div class="cbi${on?' on':''}" onclick="togF('${n}')"><input type="checkbox" ${on?'checked':''} style="width:12px;height:12px;pointer-events:none;accent-color:var(--accent)"><span>${n}</span></div>`).join('')}</div></div>`:'';
  return`
    <div class="mtabs">
      <button class="nb${f.mode==='2way'?' on':''}" onclick="setFM('2way')">2-way swap</button>
      <button class="nb${f.mode==='3way'?' on':''}" onclick="setFM('3way')">3-way swap</button>
    </div>
    <div class="card">
      <span class="clbl" style="margin-top:0">Call type</span>
      <select onchange="setFCt(this.value)">
        <option value="">-- select --</option>
        <option value="uci_primary"${f.ct==='uci_primary'?' selected':''}>UCI Primary Call</option>
        <option value="lbm"${f.ct==='lbm'?' selected':''}>LBM Call</option>
        <option value="uci_consult"${f.ct==='uci_consult'?' selected':''}>UCI Consult Call</option>
      </select>
      ${f.mode==='2way'?`<span class="clbl">Week to swap away</span><select onchange="setFW(this.value)"><option value="">-- select call type first --</option>${sched.map((w,i)=>`<option value="${i}"${f.wIdx==i?' selected':''}>${w.d} - ${w.cur}${w.switched?' (switched)':''}${holText(f.ct,i)}</option>`).join('')}</select>`:''}
      ${f.mode==='3way'&&f.ct?`<span class="clbl">Select 3 weeks</span><div class="tg">${[{v:f.w1,n:1,k:'w1'},{v:f.w2,n:2,k:'w2'},{v:f.w3,n:3,k:'w3'}].map(({v,n,k})=>`<div><label style="font-size:11px;color:var(--text3);display:block;margin-bottom:4px">Week ${n}</label><select onchange="F.${k}=this.value;renderMain()"><option value="">--</option>${sched.map((w,i)=>`<option value="${i}"${v==i?' selected':''}>${w.d} - ${w.cur}${holText(f.ct,i)}</option>`).join('')}</select></div>`).join('')}</div>`:''}
    </div>${fH}${r2}${r3}`;
}
function setFM(m){F={...F,mode:m,w1:'',w2:'',w3:''};renderMain();}
function setFCt(v){F={...F,ct:v,wIdx:'',filter:{},w1:'',w2:'',w3:''};renderMain();}
function setFW(v){F.wIdx=v;if(v!==''&&F.ct){const o=eff[F.ct][parseInt(v)].cur;F.filter=Object.fromEntries(allRes(F.ct).filter(r=>r!==o).map(r=>[r,true]));}else F.filter={};renderMain();}
function togF(n){F.filter[n]=!F.filter[n];renderMain();}
function setAllF(v){Object.keys(F.filter).forEach(k=>F.filter[k]=v);renderMain();}

/* ═══ MAIN ══════════════════════════════════════════════════════ */
function renderMain(){document.getElementById('main').innerHTML=['lbm','uci_primary','uci_consult'].includes(view)?renderSched(view):renderFinder();}
(async()=>{await initStorage();updateBadge();rebuildEff();renderNav();renderMain();await loadAll();renderNav();renderMain();})();
</script>
</body>
</html>
